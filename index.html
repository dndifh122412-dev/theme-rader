<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#08090F">
<title>Theme Surge Radar</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08090F; --surface:#11141E; --surface-2:#171B27; --surface-3:#1E2434;
    --text:#EEF0F6; --muted:#7C879F; --faint:#3A4256; --line:#1F2638;
    --surge:#FFB454; --surge-hot:#FF7A33; --surge-dim:#C98A3E; --cool:#5B95BC;
    --display:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Noto Sans KR','Segoe UI',sans-serif;
    --sans:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono','Roboto Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{background:var(--bg)}
  body{
    background:var(--bg);color:var(--text);font-family:var(--sans);
    max-width:560px;margin:0 auto;position:relative;min-height:100vh;
    padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 40px);
  }
  /* 상단 미묘한 골드 글로우 */
  body::before{content:"";position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:140%;max-width:780px;height:340px;pointer-events:none;z-index:0;
    background:radial-gradient(60% 100% at 50% 0%,rgba(255,138,51,.10),transparent 70%)}
  body>*{position:relative;z-index:1}

  /* ---------- header ---------- */
  header{position:sticky;top:0;z-index:20;
    padding:20px 0 13px;margin-bottom:18px;
    background:linear-gradient(180deg,var(--bg) 65%,transparent);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{width:26px;height:26px;flex:none}
  .brand h1{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:.04em}
  .brand h1 b{color:var(--surge);font-weight:700}
  .brand .ver{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint);
    border:1px solid var(--line);border-radius:5px;padding:3px 7px;letter-spacing:.02em}
  .meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px 9px;margin-top:11px;
    font-family:var(--mono);font-size:11px;color:var(--muted)}
  .meta .dot{width:6px;height:6px;border-radius:50%;background:var(--surge);flex:none;
    box-shadow:0 0 0 3px rgba(255,180,84,.16),0 0 9px var(--surge);animation:breathe 2.6s ease-in-out infinite}
  .meta .dot.warn{background:#E0A23B;box-shadow:0 0 0 3px rgba(224,162,59,.16),0 0 9px #E0A23B}
  .meta .dot.bad{background:#D06464;box-shadow:0 0 0 3px rgba(208,100,100,.16),0 0 9px #D06464}
  .meta .sep{color:var(--faint)}
  @keyframes breathe{0%,100%{opacity:1}50%{opacity:.55}}

  /* ---------- status banner ---------- */
  .banner{display:none;font-family:var(--mono);font-size:11.5px;line-height:1.55;
    padding:10px 13px;border-radius:10px;margin-bottom:16px;
    background:rgba(224,162,59,.09);border:1px solid rgba(224,162,59,.28);color:#E8C485}
  .banner.show{display:block;animation:fadeUp .4s ease both}

  /* ---------- market mood (sentiment) ---------- */
  .mood{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:13px 16px 15px;margin-bottom:16px;opacity:0;animation:fadeUp .5s ease both}
  .mood .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
  .mood .top .t{font-family:var(--mono);font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted)}
  .mood .top .nums{font-family:var(--mono);font-size:12px;font-weight:500}
  .mood .top .nums .p{color:var(--surge)}
  .mood .top .nums .n{color:var(--cool)}
  .mood .top .nums .sp{color:var(--faint);margin:0 5px}
  .mood .track{height:8px;border-radius:5px;overflow:hidden;display:flex;
    background:var(--surface-3);gap:2px}
  .mood .track .pos{background:linear-gradient(90deg,var(--surge-dim),var(--surge));
    box-shadow:0 0 10px rgba(255,180,84,.35);border-radius:4px 0 0 4px}
  .mood .track .neg{background:var(--cool);opacity:.5;border-radius:0 4px 4px 0}
  .mood-pill{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;
    border-radius:12px;margin-left:9px;letter-spacing:.02em}
  .mood-pill.pos{color:var(--surge);background:rgba(255,180,84,.12)}
  .mood-pill.neg{color:var(--cool);background:rgba(91,149,188,.14)}
  .mood-pill.neu{color:var(--muted);background:var(--surface-3)}

  /* ---------- hero ---------- */
  .hero{position:relative;overflow:hidden;border-radius:18px;margin-bottom:18px;
    padding:20px 20px 18px;
    background:
      radial-gradient(120% 90% at 100% 0%,rgba(255,122,51,.14),transparent 58%),
      linear-gradient(165deg,#1C1408 0%,var(--surface) 52%);
    border:1px solid rgba(255,180,84,.20);
    box-shadow:0 1px 0 rgba(255,180,84,.08) inset,0 18px 50px -28px rgba(255,138,51,.5);
    opacity:0;animation:fadeUp .55s ease both}
  .hero .tag{display:inline-flex;align-items:center;gap:6px;
    font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--surge);margin-bottom:7px}
  .hero .tag .pip{width:5px;height:5px;border-radius:50%;background:var(--surge);
    box-shadow:0 0 8px var(--surge)}
  .hero .name{font-family:var(--display);font-size:27px;font-weight:600;
    letter-spacing:-.01em;line-height:1.05;margin-bottom:3px}
  .hero .kw{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .hero .chart{margin:14px 0 9px}
  .hero .axis{display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:10px;color:var(--muted)}
  .hero .axis .mid{color:var(--faint);letter-spacing:.04em;text-transform:uppercase;font-size:9px}
  .hero .row{display:flex;align-items:flex-end;gap:20px;margin-top:14px}
  .hero .score{font-family:var(--mono);font-size:50px;font-weight:700;line-height:.85;
    color:var(--surge);letter-spacing:-.04em;
    text-shadow:0 0 24px rgba(255,180,84,.45)}
  .hero .score small{font-family:var(--mono);font-size:13px;color:var(--muted);
    font-weight:500;margin-left:4px;text-shadow:none}
  .hero .stat{display:flex;flex-direction:column;gap:3px;padding-bottom:5px}
  .hero .stat .lbl{font-family:var(--mono);font-size:9.5px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.1em}
  .hero .stat .val{font-family:var(--mono);font-size:16px;font-weight:600}
  /* 급부상 연관어 */
  .hero .rising{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;
    padding-top:14px;border-top:1px solid rgba(255,180,84,.13)}
  .rlbl{font-family:var(--mono);font-size:9.5px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.1em;width:100%;margin-bottom:2px}
  .rchip{font-family:var(--mono);font-size:11.5px;color:var(--surge);
    background:rgba(255,180,84,.09);border:1px solid rgba(255,180,84,.24);
    border-radius:14px;padding:4px 10px;display:inline-flex;gap:6px;align-items:center;
    transition:background .15s,border-color .15s}
  .rchip:active{background:rgba(255,180,84,.18)}
  .rchip .v{color:var(--surge-hot);font-size:9px;font-weight:600}

  /* ---------- list ---------- */
  .list-head{display:flex;align-items:baseline;justify-content:space-between;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin:0 2px 11px}
  .list-head span{color:var(--faint);letter-spacing:.04em}
  .card{display:grid;grid-template-columns:24px 1fr auto;gap:13px;align-items:center;
    position:relative;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:13px 15px 13px 14px;margin-bottom:9px;overflow:hidden;
    opacity:0;animation:fadeUp .5s ease both;transition:transform .14s ease,border-color .14s}
  .card:active{transform:scale(.985);border-color:var(--surface-3)}
  .card .bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0}
  .card .rank{font-family:var(--mono);font-size:13px;color:var(--muted);
    text-align:center;font-weight:600}
  .card .info{min-width:0}
  .card .info .name{font-family:var(--display);font-size:15.5px;font-weight:500;
    letter-spacing:-.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .info .sub{display:flex;align-items:center;gap:7px;margin-top:4px}
  .card .info .kw{font-family:var(--mono);font-size:10.5px;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  .badge{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 6px;
    border-radius:5px;flex:none;letter-spacing:.01em}
  .badge.up{color:var(--surge);background:rgba(255,180,84,.11)}
  .badge.dn{color:var(--cool);background:rgba(91,149,188,.12)}
  .badge.new{color:#08090F;background:var(--surge);font-weight:700;letter-spacing:.04em;
    box-shadow:0 0 12px rgba(255,180,84,.4)}
  .badge.hot{color:#08090F;background:var(--surge-hot);font-weight:700;letter-spacing:.04em;
    box-shadow:0 0 12px rgba(255,122,51,.5)}
  .hero .tag .hotinline{color:var(--surge-hot);font-weight:700}
  .hero .tag .newinline{color:var(--surge);font-weight:700}
  .card .right{display:flex;align-items:center;gap:12px}
  .card .mini{flex:none}
  .card .sc{font-family:var(--mono);font-size:21px;font-weight:700;line-height:1;
    min-width:32px;text-align:right;color:var(--surge)}

  /* ---------- sections ---------- */
  .section{margin-top:28px;opacity:0;animation:fadeUp .5s ease both}
  .section h2{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--muted);margin:0 2px 4px}
  .section .sub{font-family:var(--mono);font-size:10px;color:var(--faint);margin:0 2px 12px}
  .emerge{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:3px 15px}
  .emerge-row{display:flex;align-items:flex-start;gap:11px;padding:12px 0;
    border-bottom:1px solid var(--line)}
  .emerge-row:last-child{border-bottom:none}
  .emerge-row .et{font-family:var(--display);font-size:12.5px;font-weight:500;color:var(--text);
    min-width:80px;max-width:80px;flex:none;padding-top:4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .emerge-row .eq{display:flex;flex-wrap:wrap;gap:7px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-family:var(--mono);font-size:11.5px;color:var(--text);
    background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:6px 12px}

  /* ---------- footer ---------- */
  details.errs{margin-top:24px}
  details.errs summary{font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer}
  details.errs ul{list-style:none;margin-top:8px}
  details.errs li{font-family:var(--mono);font-size:11px;color:var(--faint);padding:3px 0}
  footer{margin-top:32px;font-family:var(--mono);font-size:10.5px;color:var(--faint);
    text-align:center;line-height:1.8}
  .reload{display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    font-family:var(--mono);font-size:11px;color:var(--muted);
    background:var(--surface);border:1px solid var(--line);border-radius:9px;
    padding:8px 15px;cursor:pointer;transition:background .15s}
  .reload:active{background:var(--surface-2)}
  .skeleton{color:var(--faint);font-family:var(--mono);font-size:13px;text-align:center;padding:70px 0}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes draw{to{stroke-dashoffset:0}}
  .chart-line.animate{stroke-dasharray:var(--len);stroke-dashoffset:var(--len);
    animation:draw 1.1s cubic-bezier(.4,0,.2,1) .15s forwards}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
    .hero,.card,.section,.banner{opacity:1}
    .chart-line.animate{stroke-dashoffset:0}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg class="logo" viewBox="0 0 512 512" aria-hidden="true">
      <defs><linearGradient id="lg" x1="0" y1="1" x2="1" y2="0">
        <stop offset="0" stop-color="#FF7A33"/><stop offset="1" stop-color="#FFB454"/>
      </linearGradient></defs>
      <rect width="512" height="512" rx="120" fill="#14100A"/>
      <polyline points="96,360 170,344 250,352 312,300 360,232 408,150 432,108"
        fill="none" stroke="url(#lg)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="432" cy="108" r="20" fill="#FFB454"/>
    </svg>
    <h1>SURGE<b>·</b>RADAR</h1>
    <span class="ver">stocks</span>
  </div>
  <div class="meta" id="meta">
    <span class="dot" id="statusDot"></span>
    <span id="updated">불러오는 중…</span>
    <span class="sep">·</span>
    <span id="scope">Worldwide · 7일</span>
    <span class="sep">·</span>
    <span id="reliability">—</span>
  </div>
</header>

<div class="banner" id="banner"></div>
<div id="app"><div class="skeleton">데이터 불러오는 중…</div></div>

<footer>
  지금 순위 = 검색 규모(앵커 기준 추정) · HOT = 급등 순위<br>
  급등 점수 = 최근 하루 vs 지난 6일 + 추세 + 가속<br>
  분위기 = 연관 검색어의 긍정/부정 단어 비율 (거친 추정)<br>
  ※ 규모는 'stock market' 검색량을 기준으로 환산한 추정치 · 투자 자문 아님
  <div><span class="reload" id="reload">↻ 새로고침</span></div>
</footer>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtPct = p => (p>=0?'+':'') + Math.round(p) + '%';
const fmtDate = iso => { if(!iso) return ''; const p=iso.split('-'); return p.length===3?`${+p[1]}.${+p[2]}`:iso; };

function scoreColor(s){
  if(s < 15) return '#7C879F';
  if(s < 55) return `hsl(38 ${58 + s*0.45}% ${62 - s*0.05}%)`;
  const t = Math.min((s-55)/45, 1);
  return `hsl(${38 - 14*t} 100% ${60 - 4*t}%)`;
}

function relTime(iso){
  const m = Math.round((Date.now() - new Date(iso).getTime())/60000);
  if(m < 1) return '방금';
  if(m < 60) return `${m}분 전`;
  const hr = Math.round(m/60);
  if(hr < 24) return `${hr}시간 전`;
  return `${Math.round(hr/24)}일 전`;
}

// Catmull-Rom -> 베지어 부드러운 곡선 path
function smoothPath(pts){
  if(pts.length < 2) return '';
  let d = `M ${pts[0][0]},${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d += ` C ${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  return d;
}

// 부드러운 글로우 차트(SVG). animate=true면 라인이 그려지는 효과
function chart(series, w, h, color, animate){
  if(!series || series.length < 2) return '';
  const min = Math.min(...series), max = Math.max(...series);
  const rng = (max - min) || 1, n = series.length, pad = 3;
  const pts = series.map((v,i)=>[ (i/(n-1))*w, h - ((v-min)/rng)*(h-pad*2) - pad ]);
  const line = smoothPath(pts);
  const area = `${line} L ${w},${h} L 0,${h} Z`;
  const last = pts[n-1];
  const uid = 'c'+Math.random().toString(36).slice(2,7);
  const len = Math.round(w * 1.6); // 애니메이션용 대략 길이
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none" preserveAspectRatio="none" style="display:block;overflow:visible">
    <defs>
      <linearGradient id="${uid}f" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${color}" stop-opacity=".30"/>
        <stop offset="1" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
      <filter id="${uid}g" x="-20%" y="-40%" width="140%" height="180%">
        <feGaussianBlur stdDeviation="2.4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path d="${area}" fill="url(#${uid}f)"/>
    <path d="${line}" stroke="${color}" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round" filter="url(#${uid}g)"
      class="chart-line${animate?' animate':''}" style="--len:${len}"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3" fill="${color}"
      filter="url(#${uid}g)"/>
  </svg>`;
}

function risingHtml(rising){
  if(!rising || !rising.length) return '';
  let h = `<div class="rising"><span class="rlbl">이 테마에서 급부상 중인 검색어</span>`;
  for(const r of rising) h += `<span class="rchip">${esc(r.q)}<span class="v">${esc(r.v)}</span></span>`;
  return h + `</div>`;
}

function moodBadge(sent){
  if(!sent || sent.bias === null || sent.bias === undefined) return '';
  const b = sent.bias;
  if(b > 0.15)  return ' <span class="mood-pill pos">긍정 우세</span>';
  if(b < -0.15) return ' <span class="mood-pill neg">부정 우세</span>';
  return ' <span class="mood-pill neu">중립</span>';
}

function render(d){
  const dot = $('#statusDot');
  $('#updated').textContent = '업데이트 ' + relTime(d.generated_at);
  $('#scope').textContent = `${d.geo} · ${d.chart_span_days||7}일`;
  if(d.reliability){
    const r = d.reliability;
    $('#reliability').textContent = `수집 ${r.collected}/${r.total}`;
    $('#reliability').style.color = r.quality==='good' ? 'var(--muted)'
      : (r.quality==='degraded' ? '#E0A23B' : '#D06464');
  }
  const banner = $('#banner');
  dot.className = 'dot';
  if(d.status === 'mock'){
    dot.classList.add('warn'); banner.className = 'banner show';
    banner.textContent = '⚠ 데모(가짜) 데이터입니다. collector.py를 실제 실행하면 진짜 트렌드로 채워집니다.';
  } else if(d.status === 'partial'){
    dot.classList.add('warn'); banner.className = 'banner show';
    banner.textContent = `⚠ 일부 키워드 수집 실패 (${d.errors.length}건). 나머지로 표시 중.`;
  } else if(d.status === 'failed'){
    dot.classList.add('bad'); banner.className = 'banner show';
    banner.textContent = '✕ 수집 실패. 마지막 데이터를 보여주거나 비어 있을 수 있습니다.';
  }

  const themes = d.themes || [];
  if(!themes.length){ $('#app').innerHTML = '<div class="skeleton">표시할 데이터가 없습니다.</div>'; return; }

  let html = '';

  // 시장 전반 감성 바 (모든 테마 연관어의 긍/부정 합)
  if(d.sentiment && d.sentiment.bias !== null && (d.sentiment.pos + d.sentiment.neg) > 0){
    const s = d.sentiment, tot = s.pos + s.neg;
    const posPct = Math.round(s.pos/tot*100), negPct = 100 - posPct;
    html += `<div class="mood">
      <div class="top"><span class="t">시장 분위기 · 검색어 기반</span>
        <span class="nums"><span class="p">긍정 ${posPct}%</span><span class="sp">·</span><span class="n">부정 ${negPct}%</span></span></div>
      <div class="track"><span class="pos" style="width:${posPct}%"></span><span class="neg" style="width:${negPct}%"></span></div>
    </div>`;
  }

  const top = themes[0];
  const topColor = scoreColor(top.score);
  const dStart = fmtDate(top.spark_start), dEnd = fmtDate(top.spark_end);
  html += `<div class="hero">
    <div class="tag"><span class="pip"></span>지금 규모 1위${top.hot?` <b class="hotinline">HOT ${top.hot}</b>`:''}${top.emerging?' <b class="newinline">NEW</b>':''}</div>
    <div class="name">${esc(top.theme)}</div>
    <div class="kw">"${esc(top.keyword)}"${moodBadge(top.sentiment)}</div>
    <div class="chart">${chart(top.spark, 520, 74, topColor, true)}</div>
    <div class="axis"><span>${dStart}</span><span class="mid">최근 ${d.chart_span_days||7}일 · 시간별</span><span>${dEnd}</span></div>
    <div class="row">
      <div class="score">${top.size}<small>/100 규모</small></div>
      <div class="stat"><span class="lbl">급등 점수</span>
        <span class="val" style="color:${top.hot?'var(--surge-hot)':'var(--text)'}">${Math.round(top.score)}</span></div>
      <div class="stat"><span class="lbl">상승률</span>
        <span class="val" style="color:${top.change_pct>=0?'var(--surge)':'var(--cool)'}">${fmtPct(top.change_pct)}</span></div>
    </div>
    ${risingHtml(top.rising)}
  </div>`;

  if(themes.length > 1){
    html += `<div class="list-head">지금 검색 규모 순위 <span>${themes.length-1} more</span></div>`;
    let i = 0;
    for(const t of themes.slice(1)){
      const c = scoreColor(t.score), up = t.change_pct >= 0;
      const delay = Math.min(i*45, 600);
      html += `<div class="card" style="animation-delay:${delay}ms">
        <div class="bar" style="background:${c};box-shadow:0 0 ${Math.round(t.score/7)}px ${c}"></div>
        <div class="rank">${t.rank_now}</div>
        <div class="info">
          <div class="name">${esc(t.theme)}</div>
          <div class="sub">
            ${t.hot?`<span class="badge hot">HOT ${t.hot}</span>`:''}
            ${t.emerging?'<span class="badge new">NEW</span>':''}
            <span class="badge ${up?'up':'dn'}">${fmtPct(t.change_pct)}</span>
            <span class="kw">"${esc(t.keyword)}"</span>
          </div>
        </div>
        <div class="right">
          <span class="mini">${chart(t.spark, 58, 28, c, false)}</span>
          <span class="sc" style="color:${c}">${Math.round(t.score)}</span>
        </div>
      </div>`;
      i++;
    }
  }

  const withRising = themes.filter(t => t.rising && t.rising.length).slice(0, 6);
  if(withRising.length){
    html += `<div class="section"><h2>신규 급부상 키워드</h2>
      <div class="sub">고정 테마 안에서 새로 떠오르는 세부 검색어</div><div class="emerge">`;
    for(const t of withRising){
      html += `<div class="emerge-row"><div class="et">${esc(t.theme)}</div><div class="eq">`;
      for(const r of t.rising) html += `<span class="rchip">${esc(r.q)}<span class="v">${esc(r.v)}</span></span>`;
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }

  if(d.trending_now && d.trending_now.length){
    html += `<div class="section"><h2>실시간 급등 검색어 (글로벌)</h2><div class="chips" style="margin-top:11px">`;
    for(const q of d.trending_now) html += `<span class="chip">${esc(q)}</span>`;
    html += `</div></div>`;
  }

  if(d.errors && d.errors.length){
    html += `<details class="errs"><summary>수집 실패 ${d.errors.length}건 보기</summary><ul>`;
    for(const e of d.errors) html += `<li>${esc(e.theme)} — ${esc(e.error||'?')}</li>`;
    html += `</ul></details>`;
  }

  $('#app').innerHTML = html;
}

async function load(){
  try{
    const r = await fetch('trends.json?t=' + Date.now(), {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){
    $('#app').innerHTML = `<div class="skeleton">데이터를 불러오지 못했습니다.<br>${esc(e.message)}</div>`;
    $('#statusDot').className = 'dot bad';
    $('#updated').textContent = '오프라인/오류';
  }
}

$('#reload').addEventListener('click', load);
load();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
