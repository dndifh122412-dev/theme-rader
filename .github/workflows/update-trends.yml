name: update-trends

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths: [ "collector.py", ".github/workflows/update-trends.yml" ]

permissions:
  contents: write

concurrency:
  group: update-trends
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect trends
        run: python collector.py --out trends.json --keep-stale || true

      - name: Commit if changed
        run: |
          git config user.name "surge-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "data: update trends $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
